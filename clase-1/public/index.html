<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex Chat — Profesor Oak</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='48' fill='%23dd2a3b' stroke='%23222' stroke-width='4'/><rect x='2' y='46' width='96' height='8' fill='%23222'/><circle cx='50' cy='50' r='16' fill='%23222'/><circle cx='50' cy='50' r='10' fill='%23fff'/><path d='M2 50 A48 48 0 0 0 98 50' fill='%23fff'/><rect x='2' y='46' width='96' height='8' fill='%23222'/><circle cx='50' cy='50' r='16' fill='%23222'/><circle cx='50' cy='50' r='10' fill='%23fff'/></svg>">
    <meta name="description"
        content="Chatea con el Profesor Oak, el experto mundial en Pokémon. Pregunta estadísticas, tipos y datos de cualquier Pokémon.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Pokedex Hardware Colors */
            --pd-red: #dd2a3b;
            --pd-red-dark: #b11f2d;
            --pd-red-shadow: #7a151f;
            --pd-lens-blue: #00cae6;
            --pd-lens-glow: rgba(0, 202, 230, 0.6);
            --pd-light-red: #ff3c4c;
            --pd-light-yellow: #fad61d;
            --pd-light-green: #37d344;
            --pd-bezel: #2a2a2a;

            /* Screen Colors (Dark Mode Premium) */
            --bg-screen: #12141a;
            --bg-history: #181a20;
            --bg-card: #1f222b;
            --bg-input: #1f222b;
            --text-primary: #e6edf3;
            --text-secondary: #8c9bb7;
            --text-muted: #57657d;

            /* Brand Accents */
            --blue-accent: #3b82f6;
            --yellow-accent: #facc15;

            /* Message Bubbles */
            --user-bubble: #172b4d;
            --assistant-bubble: #1e2532;
            --border-color: #2b303d;

            --shadow-hardware: 0 25px 50px -12px rgba(0, 0, 0, 0.8),
                0 10px 15px -3px rgba(0, 0, 0, 0.6),
                inset 0 0 0 2px rgba(255, 255, 255, 0.1),
                inset 10px 10px 20px rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #0a0c10;
            background-image:
                radial-gradient(circle at 10% 20%, rgba(221, 42, 59, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 202, 230, 0.05) 0%, transparent 40%);
            background-size: cover;
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* ── Hardware Wrapper (The Pokedex Shell) ── */
        .app-container {
            width: 100%;
            max-width: 1200px;
            height: 90vh;
            background: linear-gradient(145deg, var(--pd-red), var(--pd-red-dark));
            border-radius: 30px;
            box-shadow: var(--shadow-hardware);
            display: flex;
            flex-direction: column;
            position: relative;
            padding: 20px;
            gap: 20px;
        }

        /* ── Pokedex Hardware Header (Lights and Lens) ── */
        .hardware-header {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 10px 15px;
            height: 80px;
            position: relative;
            z-index: 10;
        }

        /* Main Blue Lens */
        .lens-container {
            position: relative;
            width: 70px;
            height: 70px;
            background: #e0e0e0;
            /* Outer white ring */
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5), inset 0 2px 5px rgba(255, 255, 255, 0.8);
        }

        .lens {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #fff, var(--pd-lens-blue) 40%, #007d8f);
            box-shadow: 0 0 15px var(--pd-lens-glow), inset 0 -4px 10px rgba(0, 0, 0, 0.4);
            animation: pulse-lens 3s infinite alternate;
        }

        @keyframes pulse-lens {
            0% {
                box-shadow: 0 0 10px var(--pd-lens-glow), inset 0 -4px 10px rgba(0, 0, 0, 0.4);
            }

            100% {
                box-shadow: 0 0 30px var(--pd-lens-blue), inset 0 -4px 10px rgba(0, 0, 0, 0.4);
            }
        }

        /* Small Status Lights */
        .status-lights {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
            /* Alignment with lens curve */
        }

        .light {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 1px solid rgba(0, 0, 0, 0.3);
            box-shadow: inset 0 2px 4px rgba(255, 255, 255, 0.6), 0 2px 4px rgba(0, 0, 0, 0.4);
        }

        .light.red {
            background: radial-gradient(circle at 30% 30%, #ff8c96, var(--pd-light-red) 50%, #8b000d);
        }

        .light.yellow {
            background: radial-gradient(circle at 30% 30%, #fffda8, var(--pd-light-yellow) 50%, #a68400);
        }

        .light.green {
            background: radial-gradient(circle at 30% 30%, #a8ffb0, var(--pd-light-green) 50%, #00600a);
        }

        /* Slanted Divider Line Design */
        .hardware-lines {
            flex: 1;
            height: 100%;
            position: relative;
        }

        .hardware-lines::before {
            content: '';
            position: absolute;
            bottom: 0px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--pd-red-shadow);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* ── Screen Area Layout (Bezel inside the Red Shell) ── */
        .hardware-bezel {
            flex: 1;
            background: var(--pd-bezel);
            border-radius: 12px 12px 20px 20px;
            border: 2px solid #111;
            border-bottom-width: 6px;
            box-shadow: inset 0 5px 15px rgba(0, 0, 0, 0.8), 0 5px 15px rgba(0, 0, 0, 0.3);
            display: flex;
            overflow: hidden;
            position: relative;
        }

        /* ── Sidebar (History) ── */
        .sidebar {
            width: 300px;
            background: var(--bg-history);
            border-right: 2px solid #000;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            position: relative;
            z-index: 2;
        }

        .sidebar-header {
            padding: 20px 16px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-family: 'Chakra Petch', sans-serif;
        }

        .sidebar-header h2 {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: 0.05em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .new-chat-btn {
            padding: 8px 14px;
            background: var(--pd-lens-blue);
            border: 1px solid #000;
            border-radius: 6px;
            color: #000;
            font-family: 'Chakra Petch', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 0 #007d8f;
        }

        .new-chat-btn:hover {
            transform: translateY(2px);
            box-shadow: 0 0 0 #007d8f;
            background: #00e5ff;
        }

        .conversations-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .conversations-list::-webkit-scrollbar {
            width: 4px;
        }

        .conversations-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .conversations-list::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 2px;
        }

        .conv-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px;
            border-radius: 8px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: all 0.15s ease;
            position: relative;
        }

        .conv-item:hover {
            border-color: var(--pd-lens-blue);
            background: #252a36;
        }

        .conv-item.active {
            background: rgba(0, 202, 230, 0.1);
            border-color: var(--pd-lens-blue);
            box-shadow: 0 0 10px rgba(0, 202, 230, 0.1);
        }

        .conv-item-icon {
            font-size: 18px;
            filter: grayscale(1);
            transition: filter 0.2s;
        }

        .conv-item.active .conv-item-icon {
            filter: grayscale(0);
        }

        .conv-item-info {
            flex: 1;
            min-width: 0;
        }

        .conv-item-preview {
            font-size: 0.85rem;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 500;
        }

        .conv-item-meta {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 4px;
            font-family: 'Chakra Petch', sans-serif;
        }

        .conv-delete-btn {
            width: 30px;
            height: 30px;
            border-radius: 6px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all 0.15s ease;
            flex-shrink: 0;
        }

        .conv-item:hover .conv-delete-btn {
            opacity: 1;
        }

        .conv-delete-btn:hover {
            color: var(--pd-light-red);
        }

        .sidebar-empty {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        /* ── Main Chat Display (The "Screen") ── */
        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-screen);
            position: relative;
        }

        /* Subtle scanlines for retro tech screen effect */
        .chat-panel::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 100;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
            opacity: 0.6;
        }

        /* ── Header inside chat panel ── */
        .header {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 24px 30px;
            border-bottom: 1px solid var(--border-color);
            background: rgba(18, 20, 26, 0.8);
            backdrop-filter: blur(10px);
            z-index: 101;
            /* Above scanlines */
        }

        .header-avatar {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            background: #fff;
            border: 2px solid var(--pd-lens-blue);
            box-shadow: 0 0 15px rgba(0, 202, 230, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 4px;
        }

        .header-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;
        }

        .header-info h1 {
            font-size: 1.25rem;
            font-weight: 700;
            color: #fff;
            font-family: 'Chakra Petch', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .header-info p {
            font-size: 0.85rem;
            color: var(--pd-lens-blue);
            font-weight: 500;
            font-family: 'Chakra Petch', sans-serif;
            margin-top: 2px;
        }

        /* ── Messages area ── */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
            z-index: 101;
            /* Above scanlines */
        }

        .messages-container::-webkit-scrollbar {
            width: 8px;
        }

        .messages-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages-container::-webkit-scrollbar-thumb {
            background: rgba(0, 202, 230, 0.3);
            border-radius: 4px;
            border: 1px solid var(--pd-bezel);
        }

        /* Welcome message */
        .welcome {
            text-align: center;
            padding: 60px 20px;
            animation: fadeIn 0.6s ease;
        }

        .welcome-pokeball {
            font-size: 56px;
            margin-bottom: 24px;
            display: inline-block;
            filter: drop-shadow(0 0 20px rgba(0, 202, 230, 0.4));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px) rotate(0deg);
            }

            50% {
                transform: translateY(-12px) rotate(5deg);
            }
        }

        .welcome h2 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 12px;
            color: #fff;
            font-family: 'Chakra Petch', sans-serif;
        }

        .welcome p {
            color: var(--text-secondary);
            font-size: 1rem;
            line-height: 1.6;
            max-width: 500px;
            margin: 0 auto 30px;
        }

        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            max-width: 600px;
            margin: 0 auto;
        }

        .suggestion-chip {
            padding: 10px 18px;
            background: rgba(0, 202, 230, 0.05);
            border: 1px solid var(--pd-lens-blue);
            border-radius: 8px;
            font-size: 0.9rem;
            color: var(--pd-lens-blue);
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Chakra Petch', sans-serif;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .suggestion-chip:hover {
            background: var(--pd-lens-blue);
            color: #000;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 202, 230, 0.3);
        }

        /* Message bubbles */
        .message {
            display: flex;
            gap: 16px;
            max-width: 85%;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-content {
            padding: 16px 20px;
            border-radius: 12px;
            font-size: 0.95rem;
            line-height: 1.6;
            font-weight: 400;
            position: relative;
        }

        .message.assistant .message-content {
            background: var(--assistant-bubble);
            border: 1px solid var(--border-color);
            border-top-left-radius: 2px;
            color: var(--text-primary);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .message.assistant .message-content::before {
            content: '';
            position: absolute;
            left: -8px;
            top: 0;
            border-style: solid;
            border-width: 0 8px 12px 0;
            border-color: transparent var(--border-color) transparent transparent;
        }

        .message.user .message-content {
            background: var(--user-bubble);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-top-right-radius: 2px;
            color: #fff;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .message.user .message-content::before {
            content: '';
            position: absolute;
            right: -8px;
            top: 0;
            border-style: solid;
            border-width: 12px 8px 0 0;
            border-color: rgba(59, 130, 246, 0.3) transparent transparent transparent;
        }

        /* Typed out Poke-Stats / Styling */
        .message-content p {
            margin-bottom: 12px;
        }

        .message-content p:last-child {
            margin-bottom: 0;
        }

        .message-content strong {
            color: var(--yellow-accent);
            font-weight: 600;
        }

        .message-content em {
            color: var(--text-secondary);
        }

        .message-content ul {
            padding-left: 0;
            margin: 12px 0;
            list-style: none;
        }

        .message-content li {
            margin-bottom: 6px;
            padding-left: 20px;
            position: relative;
            font-family: 'Chakra Petch', sans-serif;
            color: #d1d5db;
        }

        .message-content li::before {
            content: '▶';
            position: absolute;
            left: 0;
            color: var(--pd-lens-blue);
            font-size: 0.7em;
            top: 4px;
        }

        .message-content h3,
        .message-content strong[style*="font-size"] {
            display: block;
            font-family: 'Chakra Petch', sans-serif;
            color: var(--pd-lens-blue);
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(0, 202, 230, 0.2);
            padding-bottom: 4px;
            margin-top: 16px;
            margin-bottom: 10px;
        }

        /* Pokemon image in messages */
        .pokemon-image {
            max-width: 150px;
            image-rendering: pixelated;
            margin: 12px 0;
            display: block;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 10px;
            border: 1px dashed var(--border-color);
        }

        /* Typing indicator */
        .typing-indicator {
            display: flex;
            gap: 6px;
            padding: 8px 4px;
            align-items: center;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--pd-lens-blue);
            animation: bounce 1.4s ease-in-out infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.15s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.3s;
        }

        @keyframes bounce {

            0%,
            60%,
            100% {
                transform: translateY(0);
                opacity: 0.4;
            }

            30% {
                transform: translateY(-6px);
                opacity: 1;
                box-shadow: 0 0 10px var(--pd-lens-blue);
            }
        }

        /* ── Input area ── */
        .input-area {
            padding: 20px 30px;
            background: rgba(18, 20, 26, 0.9);
            border-top: 1px solid var(--border-color);
            z-index: 101;
            /* Above scanlines */
            position: relative;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--bg-input);
            border-radius: 12px;
            border: 2px solid var(--border-color);
            padding: 8px 8px 8px 24px;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .input-wrapper:focus-within {
            border-color: var(--pd-lens-blue);
            box-shadow: 0 0 15px rgba(0, 202, 230, 0.15), inset 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        #message-input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-size: 1.05rem;
            font-family: 'Outfit', sans-serif;
            padding: 12px 0;
        }

        #message-input::placeholder {
            color: var(--text-muted);
            font-family: 'Chakra Petch', sans-serif;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        #send-button {
            width: 48px;
            height: 48px;
            border-radius: 8px;
            border: none;
            background: var(--pd-lens-blue);
            color: #000;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            flex-shrink: 0;
            box-shadow: 0 3px 0 #007d8f;
        }

        #send-button:hover:not(:disabled) {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #007d8f;
            background: #00e5ff;
        }

        #send-button:disabled {
            background: var(--border-color);
            color: var(--text-muted);
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        #send-button svg {
            width: 22px;
            height: 22px;
            stroke-width: 2.5;
        }

        .input-hint {
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 12px;
            font-family: 'Chakra Petch', sans-serif;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* Dex Decor lines on the bezel */
        .dex-decor-btm {
            position: absolute;
            bottom: 10px;
            right: 20px;
            display: flex;
            gap: 5px;
            z-index: 102;
        }

        .dex-decor-btm span {
            display: block;
            width: 20px;
            height: 4px;
            background: #111;
            border-radius: 2px;
            box-shadow: 0 1px 1px rgba(255, 255, 255, 0.1);
        }

        /* ── Responsive ── */
        @media (max-width: 900px) {
            .app-container {
                height: 100vh;
                border-radius: 0;
                max-width: 100%;
                padding: 10px;
            }

            .hardware-bezel {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: 200px;
                border-right: none;
                border-bottom: 2px solid #000;
            }

            .message {
                max-width: 92%;
            }
        }
    </style>
</head>

<body>
    <div class="app-container">
        <!-- Pokedex Hardware Header -->
        <div class="hardware-header">
            <div class="lens-container">
                <div class="lens"></div>
            </div>
            <div class="status-lights">
                <div class="light red"></div>
                <div class="light yellow"></div>
                <div class="light green"></div>
            </div>
            <div class="hardware-lines"></div>
        </div>

        <!-- The Screen Bezel -->
        <div class="hardware-bezel">
            <!-- Sidebar -->
            <div class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <h2>DATOS REGISTRADOS</h2>
                    <button class="new-chat-btn" id="new-chat-btn">✚ Nuevo</button>
                </div>
                <div class="conversations-list" id="conversations-list">
                    <div class="sidebar-empty" id="sidebar-empty">
                        <span style="font-size: 24px; display:block; margin-bottom:10px; filter: grayscale(1)">💾</span>
                        Memoria vacía.<br>Inicializa una consulta.
                    </div>
                </div>
            </div>

            <!-- Chat panel -->
            <div class="chat-panel">
                <!-- Header -->
                <div class="header">
                    <div class="header-avatar">
                        <img src="https://yt3.googleusercontent.com/rctSS0qmDZOev3BtC6ZyNzHQ321HT-4JsVZRtplec5OxbKzbG-fhvK0qgkIoatSgDH_PWT-aew=s900-c-k-c0x00ffffff-no-rj"
                            alt="Profesor Oak">
                    </div>
                    <div class="header-info">
                        <h1>Sist. Prof Oak</h1>
                        <p>Interfaz de Red global POKéDEX</p>
                    </div>
                </div>

                <!-- Messages -->
                <div class="messages-container" id="messages-container">
                    <div class="welcome" id="welcome">
                        <div class="welcome-pokeball">Ϟ</div>
                        <h2>SISTEMA INICIADO</h2>
                        <p>Analizador de datos Pokémon activo. Conectado al mainframe del Prof. Oak. Ingrese parámetro
                            de búsqueda.</p>
                        <div class="suggestions" id="suggestions"></div>
                    </div>
                </div>

                <!-- Input -->
                <div class="input-area">
                    <form id="chat-form" class="input-wrapper">
                        <input type="text" id="message-input" placeholder="Ingrese comando o pregunta..."
                            autocomplete="off" autofocus>
                        <button type="submit" id="send-button" title="Transmitir">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="square"
                                stroke-linejoin="miter">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                        </button>
                    </form>
                    <div class="input-hint">CONEXIÓN SEGURA · POKEAPI SERVER · CACHÉ VALKEY ACTIVO</div>
                </div>

                <div class="dex-decor-btm">
                    <span></span><span></span><span></span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const messagesContainer = document.getElementById('messages-container');
        const chatForm = document.getElementById('chat-form');
        const messageInput = document.getElementById('message-input');
        const sendButton = document.getElementById('send-button');
        const welcome = document.getElementById('welcome');
        const conversationsList = document.getElementById('conversations-list');
        const sidebarEmpty = document.getElementById('sidebar-empty');
        const newChatBtn = document.getElementById('new-chat-btn');

        // State
        let conversationMessages = [];
        let currentConversationId = null;
        let isLoading = false;

        // ── Init ──
        loadConversations();

        // ── New chat button ──
        newChatBtn.addEventListener('click', () => {
            startNewChat();
        });

        function startNewChat() {
            currentConversationId = null;
            conversationMessages = [];
            messagesContainer.innerHTML = '';
            // Re-add welcome
            messagesContainer.innerHTML = `
                <div class="welcome" id="welcome">
                    <div class="welcome-pokeball">Ϟ</div>
                    <h2>SISTEMA INICIADO</h2>
                    <p>Analizador de datos Pokémon activo. Conectado al mainframe del Prof. Oak. Ingrese parámetro de búsqueda.</p>
                    <div class="suggestions" id="suggestions"></div>
                </div>
            `;
            renderSuggestions();
            highlightActiveConversation();
            messageInput.focus();
        }

        // ── Suggestions pool (20 options, show 4 random) ──
        const allSuggestions = [
            { label: 'DATOS: PIKACHU', message: '¿Cuáles son las estadísticas de Pikachu?' },
            { label: 'ESPECIE: CHARIZARD', message: '¿Qué tipo es Charizard y cuánto pesa?' },
            { label: 'COMPARAR: GENGAR / ALAKAZAM', message: 'Compara a Gengar contra Alakazam' },
            { label: 'QUERY: MAYOR MASA GEN 1', message: '¿Cuál es el Pokémon más pesado de la primera generación?' },
            { label: 'EVOLUCIÓN: EEVEE', message: '¿Cuáles son todas las evoluciones de Eevee y sus tipos?' },
            { label: 'DATOS: MEWTWO', message: '¿Cuáles son las estadísticas y habilidades de Mewtwo?' },
            { label: 'TIPO: DRAGÓN', message: '¿Qué Pokémon de tipo Dragón existen en la primera generación?' },
            { label: 'COMPARAR: BLASTOISE / VENUSAUR', message: 'Compara a Blastoise contra Venusaur' },
            { label: 'ESPECIE: SNORLAX', message: '¿Cuánto pesa Snorlax y cuáles son sus estadísticas?' },
            { label: 'QUERY: MÁS RÁPIDO GEN 1', message: '¿Cuál es el Pokémon más rápido de la primera generación?' },
            { label: 'DATOS: GYARADOS', message: 'Dame todos los datos de Gyarados' },
            { label: 'HABILIDAD: DITTO', message: '¿Qué habilidades tiene Ditto y cómo funcionan?' },
            { label: 'ESPECIE: LUCARIO', message: '¿Qué tipo es Lucario y cuáles son sus stats?' },
            { label: 'COMPARAR: MACHAMP / HITMONLEE', message: 'Compara a Machamp contra Hitmonlee' },
            { label: 'DATOS: GARDEVOIR', message: '¿Cuáles son las estadísticas de Gardevoir?' },
            { label: 'QUERY: LEGENDARIOS GEN 1', message: '¿Cuáles son todos los Pokémon legendarios de la primera generación?' },
            { label: 'EVOLUCIÓN: MAGIKARP', message: '¿Cómo evoluciona Magikarp y qué tan fuerte es Gyarados?' },
            { label: 'TIPO: FANTASMA', message: '¿Qué Pokémon de tipo Fantasma hay y contra qué son efectivos?' },
            { label: 'DATOS: DRAGONITE', message: 'Dame las estadísticas completas de Dragonite' },
            { label: 'QUERY: MENOR DEFENSA', message: '¿Cuál es el Pokémon con menor defensa de todos?' },
        ];

        function renderSuggestions() {
            const container = document.getElementById('suggestions');
            if (!container) return;
            const shuffled = [...allSuggestions].sort(() => Math.random() - 0.5);
            const picked = shuffled.slice(0, 4);
            container.innerHTML = picked.map(s =>
                `<button class="suggestion-chip" data-message="${s.message}">${s.label}</button>`
            ).join('');
            bindSuggestionChips();
        }

        renderSuggestions();

        // ── Suggestion chips ──
        function bindSuggestionChips() {
            document.querySelectorAll('.suggestion-chip').forEach(chip => {
                chip.addEventListener('click', () => {
                    const msg = chip.getAttribute('data-message');
                    messageInput.value = msg;
                    sendMessage(msg);
                });
            });
        }

        chatForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const text = messageInput.value.trim();
            if (!text || isLoading) return;
            sendMessage(text);
        });

        async function sendMessage(text) {
            if (isLoading) return;

            // Hide welcome
            const welcomeEl = document.getElementById('welcome');
            if (welcomeEl) welcomeEl.style.display = 'none';

            isLoading = true;
            sendButton.disabled = true;
            messageInput.value = '';

            // Add user message to UI
            appendMessage('user', text);
            conversationMessages.push({ role: 'user', content: text });

            // Show typing indicator
            const typingEl = showTyping();

            try {
                const body = {
                    messages: conversationMessages,
                };
                if (currentConversationId) {
                    body.conversationId = currentConversationId;
                }

                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.error || 'Error del servidor');
                }

                const data = await response.json();
                const assistantText = data.text;
                currentConversationId = data.conversationId;

                typingEl.remove();
                appendMessage('assistant', assistantText);
                conversationMessages.push({ role: 'assistant', content: assistantText });

                // Refresh sidebar
                loadConversations();

            } catch (error) {
                typingEl.remove();
                appendMessage('assistant', `⚠️ Error del Sistema: ${error.message}`);
            } finally {
                isLoading = false;
                sendButton.disabled = false;
                messageInput.focus();
            }
        }

        // ── Load conversation history ──
        async function loadConversations() {
            try {
                const res = await fetch('/api/conversations');
                const conversations = await res.json();

                if (conversations.length === 0) {
                    sidebarEmpty.style.display = 'block';
                    // Remove all conv-items
                    document.querySelectorAll('.conv-item').forEach(el => el.remove());
                    return;
                }

                sidebarEmpty.style.display = 'none';

                // Clear existing items
                document.querySelectorAll('.conv-item').forEach(el => el.remove());

                conversations.forEach(conv => {
                    const item = document.createElement('div');
                    item.className = `conv-item${conv.id === currentConversationId ? ' active' : ''}`;
                    item.dataset.id = conv.id;

                    const timeAgo = getTimeAgo(conv.updatedAt);

                    item.innerHTML = `
                        <div class="conv-item-icon">💾</div>
                        <div class="conv-item-info">
                            <div class="conv-item-preview">${escapeHtml(conv.preview)}</div>
                            <div class="conv-item-meta">CHR: ${conv.messageCount} | T-${timeAgo}</div>
                        </div>
                        <button class="conv-delete-btn" title="Borrar registro" data-id="${conv.id}">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="18" y1="6" x2="6" y2="18"></line>
                                <line x1="6" y1="6" x2="18" y2="18"></line>
                            </svg>
                        </button>
                    `;

                    // Click to load conversation
                    item.addEventListener('click', (e) => {
                        if (e.target.closest('.conv-delete-btn')) return;
                        loadConversation(conv.id);
                    });

                    // Delete button
                    item.querySelector('.conv-delete-btn').addEventListener('click', async (e) => {
                        e.stopPropagation();
                        await deleteConversation(conv.id);
                    });

                    conversationsList.appendChild(item);
                });

            } catch (error) {
                console.error('Error loading conversations:', error);
            }
        }

        async function loadConversation(id) {
            try {
                const res = await fetch(`/api/conversations/${id}`);
                if (!res.ok) return;
                const data = await res.json();

                currentConversationId = data.id;
                conversationMessages = data.messages;

                // Render messages
                messagesContainer.innerHTML = '';
                data.messages.forEach(msg => {
                    appendMessage(msg.role, msg.content);
                });

                highlightActiveConversation();
                messageInput.focus();
            } catch (error) {
                console.error('Error loading conversation:', error);
            }
        }

        async function deleteConversation(id) {
            try {
                await fetch(`/api/conversations/${id}`, { method: 'DELETE' });

                // If deleting the current conversation, start a new chat
                if (id === currentConversationId) {
                    startNewChat();
                }

                loadConversations();
            } catch (error) {
                console.error('Error deleting conversation:', error);
            }
        }

        function highlightActiveConversation() {
            document.querySelectorAll('.conv-item').forEach(el => {
                el.classList.toggle('active', el.dataset.id === currentConversationId);
            });
        }

        // ── UI helpers ──
        function appendMessage(role, text) {
            const wrapper = document.createElement('div');
            wrapper.className = `message ${role}`;

            const content = document.createElement('div');
            content.className = 'message-content';
            content.innerHTML = formatText(text);

            wrapper.appendChild(content);
            messagesContainer.appendChild(wrapper);
            scrollToBottom();
        }

        function showTyping() {
            const wrapper = document.createElement('div');
            wrapper.className = 'message assistant';

            const content = document.createElement('div');
            content.className = 'message-content';
            content.innerHTML = `
                <div class="typing-indicator">
                    <span></span><span></span><span></span>
                </div>
            `;

            wrapper.appendChild(content);
            messagesContainer.appendChild(wrapper);
            scrollToBottom();
            return wrapper;
        }

        function formatText(text) {
            if (!text) return '<em>[DATOS CORRUPTOS]</em>';

            return text
                // Images: ![alt](url)
                .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1" class="pokemon-image">')
                // Links: [text](url)
                .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" style="color: var(--pd-lens-blue);">$1</a>')
                // Bold: **text**
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                // Italic: *text*
                .replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<em>$1</em>')
                // Headers: ### text
                .replace(/^### (.+)/gm, '<strong style="font-size:1.1em;">$1</strong>')
                // Bullet lists
                .replace(/^- (.+)/gm, '<li>$1</li>')
                // Wrap consecutive <li> tags in <ul>
                .replace(/(<li>.*<\/li>(\s*<br>\s*)*)+/g, match => `<ul>${match.replace(/<br>/g, '')}</ul>`)
                // Newlines
                .replace(/\n/g, '<br>');
        }

        function scrollToBottom() {
            requestAnimationFrame(() => {
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            });
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function getTimeAgo(timestamp) {
            const seconds = Math.floor((Date.now() - timestamp) / 1000);
            if (seconds < 60) return '0m';
            const minutes = Math.floor(seconds / 60);
            if (minutes < 60) return `${minutes}m`;
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return `${hours}h`;
            const days = Math.floor(hours / 24);
            return `${days}d`;
        }
    </script>
</body>

</html>
